<!DOCTYPE html>
<html>
<head>
<title>PUC Computer Science MCQ Portal</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
width:60%;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

.option{
display:block;
margin:10px;
padding:10px;
background:#eee;
border-radius:5px;
cursor:pointer;
}

.hidden{
display:none;
}

#timer{
font-size:20px;
color:red;
}
</style>

</head>

<body>

<div class="container">

<h1>1st PUC Computer Science MCQ Portal</h1>

<div id="home">

<h2>Select Chapter</h2>

<button onclick="startQuiz('ch1')">Chapter 1: Computer System</button>

<button onclick="startQuiz('ch2')">Chapter 2: Number System</button>

</div>

<div id="quiz" class="hidden">

<h3 id="chapterTitle"></h3>

<div id="timer"></div>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

<div id="result" class="hidden">

<h2>Quiz Finished</h2>

<h3 id="score"></h3>

<button onclick="location.reload()">Back to Home</button>

</div>

</div>

<script>

let chapter=""
let questions=[]
let current=0
let score=0
let time=0
let timer

const ch1=[
{
q:"Who is called the father of computer?",
o:["Charles Babbage","Alan Turing","Bill Gates","Steve Jobs"],
a:0
},
{
q:"First generation computers used",
o:["Vacuum tubes","Transistors","IC","Microprocessor"],
a:0
},
{
q:"Computer is an",
o:["Electronic device","Mechanical device","Manual device","None"],
a:0
},
{
q:"CPU stands for",
o:["Central Processing Unit","Computer Processing Unit","Central Program Unit","None"],
a:0
},
{
q:"ALU performs",
o:["Arithmetic and logic","Storage","Input","Output"],
a:0
},
{
q:"Which is an input device?",
o:["Keyboard","Monitor","Printer","Speaker"],
a:0
},
{
q:"Which is an output device?",
o:["Monitor","Keyboard","Mouse","Scanner"],
a:0
},
{
q:"Brain of computer",
o:["CPU","RAM","Hard disk","Monitor"],
a:0
},
{
q:"Example of storage device",
o:["Hard disk","Keyboard","Mouse","Monitor"],
a:0
},
{
q:"Computer works on",
o:["Input Process Output","Output Input","Process Input","None"],
a:0
}
]

const ch2=[
{
q:"Binary number system base is",
o:["2","8","10","16"],
a:0
},
{
q:"Decimal number system base",
o:["10","2","8","16"],
a:0
},
{
q:"Hexadecimal system base",
o:["16","2","10","8"],
a:0
},
{
q:"Binary digits are called",
o:["Bits","Bytes","Codes","Data"],
a:0
},
{
q:"1 Byte =",
o:["8 bits","4 bits","2 bits","16 bits"],
a:0
},
{
q:"Example of encoding scheme",
o:["ASCII","CPU","RAM","ALU"],
a:0
},
{
q:"Binary of decimal 2",
o:["10","11","01","00"],
a:0
},
{
q:"Binary of decimal 5",
o:["101","100","110","111"],
a:0
},
{
q:"Binary addition 1+1",
o:["10","11","01","00"],
a:0
},
{
q:"Decimal number uses digits",
o:["0-9","0-1","A-F","1-8"],
a:0
}
]

function startQuiz(ch){

chapter=ch

document.getElementById("home").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

if(ch=="ch1"){
questions=ch1
time=300
document.getElementById("chapterTitle").innerText="Chapter 1: Computer System"
}

if(ch=="ch2"){
questions=ch2
time=300
document.getElementById("chapterTitle").innerText="Chapter 2: Number System"
}

startTimer()

showQuestion()

}

function startTimer(){

timer=setInterval(function(){

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerText="Time: "+min+":"+sec

time--

if(time<0){
clearInterval(timer)
finishQuiz()
}

},1000)

}

function showQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let optionsHTML=""

q.o.forEach((opt,i)=>{
optionsHTML+=`<div class="option">
<input type="radio" name="opt" value="${i}"> ${opt}
</div>`
})

document.getElementById("options").innerHTML=optionsHTML

}

function nextQuestion(){

let selected=document.querySelector('input[name="opt"]:checked')

if(selected){

if(parseInt(selected.value)==questions[current].a){
score++
}

}

current++

if(current<questions.length){
showQuestion()
}
else{
finishQuiz()
}

}

function finishQuiz(){

clearInterval(timer)

document.getElementById("quiz").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

document.getElementById("score").innerText="Score: "+score+" / "+questions.length

}

</script>

</body>
</html>
