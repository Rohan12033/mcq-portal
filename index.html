function startQuiz(ch){

questions=data[ch]
current=0
score=0
userAnswers=[]

document.getElementById("home").classList.add("hidden")
document.getElementById("quiz").classList.remove("hidden")

document.getElementById("chapterTitle").innerText="Chapter "+ch

startTimer()
showQuestion()

}

function startTimer(){

timer=setInterval(function(){

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText="Time: "+m+":"+s

time--

if(time<0){
finishQuiz()
}

},1000)

}

function showQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

q.o.forEach((opt,i)=>{
html+=`<div class="option">
<input type="radio" name="opt" value="${i}"> ${opt}
</div>`
})

document.getElementById("options").innerHTML=html

}

function nextQuestion(){

let selected=document.querySelector('input[name="opt"]:checked')

if(selected){

let ans=parseInt(selected.value)

userAnswers.push(ans)

if(ans==questions[current].a){
score++
}

}else{

userAnswers.push(null)

}

current++

if(current<questions.length){

showQuestion()

}else{

finishQuiz()

}

}

function finishQuiz(){

clearInterval(timer)

document.getElementById("quiz").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

document.getElementById("score").innerText="Score: "+score+" / "+questions.length

let reviewHTML=""

questions.forEach((q,i)=>{

let correct=q.o[q.a]
let user=userAnswers[i]!=null ? q.o[userAnswers[i]] : "Not Answered"

let color=(userAnswers[i]==q.a) ? "green" : "red"

reviewHTML+=`
<p>
<b>Q${i+1}: ${q.q}</b><br>
Your Answer: <span style="color:${color}">${user}</span><br>
Correct Answer: ${correct}
</p>
<hr>
`

})

document.getElementById("review").innerHTML=reviewHTML

}
