<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1st PUC Computer Science MCQ Portal</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
margin:0;
}

header{
background:#1f3c88;
color:white;
padding:15px;
font-size:24px;
}

.container{
width:70%;
margin:auto;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
background:#1f3c88;
color:white;
border:none;
border-radius:5px;
}

.option{
background:#f0f0f0;
padding:12px;
margin:8px;
border-radius:6px;
cursor:pointer;
}

.option:hover{
background:#dbe3ff;
}

.selected{
background:#8fa8ff;
}

.timer{
color:red;
font-size:18px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>1st PUC Computer Science MCQ Portal</header>

<div class="container" id="quiz">

<div class="timer" id="timer"></div>

<h3 id="question"></h3>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>


<div class="container" id="result" style="display:none">

<h2>Quiz Completed</h2>

<p id="score"></p>
<p id="timeTaken"></p>

<button onclick="location.reload()">Restart</button>

</div>


<script>

let questions=[

{q:"Who is known as father of computer?",o:["Charles Babbage","Alan Turing","Bill Gates","Steve Jobs"],a:0},
{q:"CPU stands for?",o:["Central Processing Unit","Control Program Unit","Central Program Utility","Computer Power Unit"],a:0},
{q:"Which is an input device?",o:["Monitor","Keyboard","Printer","Speaker"],a:1},
{q:"Which memory is temporary?",o:["ROM","RAM","Hard disk","DVD"],a:1},
{q:"Binary number system base is?",o:["2","8","10","16"],a:0},
{q:"Decimal number system base is?",o:["2","8","10","16"],a:2},
{q:"ASCII is used for?",o:["Character encoding","Networking","Operating system","Programming"],a:0},
{q:"AI stands for?",o:["Artificial Intelligence","Advanced Internet","Automatic Input","Artificial Interface"],a:0},
{q:"IoT stands for?",o:["Internet of Things","Input of Technology","Internet of Technology","Interface of Things"],a:0},
{q:"Cloud computing stores data?",o:["Internet servers","Hard disk","USB","DVD"],a:0},
{q:"Algorithm means?",o:["Step-by-step solution","Programming language","Computer hardware","Memory unit"],a:0},
{q:"Flowchart uses?",o:["Symbols","Numbers","Words","Pictures"],a:0},
{q:"Python is?",o:["Programming language","Operating system","Database","Browser"],a:0},
{q:"Comment symbol in Python?",o:["#","//","--","**"],a:0},
{q:"Loop used when condition true?",o:["while","switch","case","goto"],a:0},
{q:"Function defined using?",o:["def","fun","define","function"],a:0},
{q:"String stores?",o:["Characters","Numbers","Images","Videos"],a:0},
{q:"List symbol?",o:["[]","()","{}","<>"],a:0},
{q:"Tuple symbol?",o:["()","[]","{}","<>"],a:0},
{q:"Dictionary uses?",o:["Key value pairs","Numbers","Characters","Images"],a:0},
{q:"Digital footprint means?",o:["Online trace","Computer memory","Software","Hardware"],a:0},
{q:"Unauthorized access is?",o:["Hacking","Programming","Formatting","Scanning"],a:0},
{q:"Which is output device?",o:["Printer","Keyboard","Mouse","Scanner"],a:0},
{q:"Which generation used vacuum tubes?",o:["First","Second","Third","Fourth"],a:0},
{q:"Hexadecimal base?",o:["16","10","8","2"],a:0},
{q:"Binary of 5?",o:["101","110","111","100"],a:0},
{q:"Which is storage device?",o:["Hard disk","Keyboard","Mouse","Monitor"],a:0},
{q:"Python file extension?",o:[".py",".java",".cpp",".html"],a:0},
{q:"for loop used for?",o:["Iteration","Condition","Storage","Input"],a:0},
{q:"Cybercrime means?",o:["Crime using computer","Programming","Typing","Browsing"],a:0}

]

let current=0
let score=0
let selected=null
let time=1800
let totalTime=1800

let timer=setInterval(()=>{

time--

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerText="Time Left: "+min+":"+sec

if(time<=0){
finishQuiz()
}

},1000)


function showQuestion(){

let q=questions[current]

document.getElementById("question").innerText=(current+1)+". "+q.q

let html=""

q.o.forEach((opt,i)=>{

html+=`<div class="option" onclick="selectOption(${i},this)">${opt}</div>`

})

document.getElementById("options").innerHTML=html

selected=null

}

function selectOption(i,el){

selected=i

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"))

el.classList.add("selected")

}

function nextQuestion(){

if(selected===questions[current].a){
score++
}

current++

if(current>=questions.length){
finishQuiz()
}else{
showQuestion()
}

}

function finishQuiz(){

clearInterval(timer)

document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("score").innerText="Score: "+score+" / "+questions.length

let timeUsed=totalTime-time

document.getElementById("timeTaken").innerText="Time Taken: "+timeUsed+" seconds"

}

showQuestion()

</script>

</body>
</html>
